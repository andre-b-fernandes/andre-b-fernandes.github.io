---
layout: default
---

{% include navbar.html %}

<main class="site-main">
  <div class="container py-5">
    {%- if page.title -%}
    <div class="mb-1">
      <h1 class="page-heading">{{ page.title }}</h1>
    </div>
    {%- endif -%}
    {%- if page.subtitle -%}
    <div class="mb-4">
      <h2 class="page-subheading text-muted">{{ page.subtitle }}</h2>
    </div>
    {%- endif -%}
    {{ content }}
  </div>
</main>
