---
layout: default
---

{% include navbar.html %}

<main class="site-main">
  <div class="container resume-container">
    {%- if page.title -%}
    <div class="resume-header">
      <h1 class="resume-name">{{ page.title }}</h1>
      {%- if page.subtitle -%}
      <div class="resume-role">{{ page.subtitle }}</div>
      {%- endif -%}
    </div>
    {%- endif -%}
    {{ content }}
  </div>
</main>
