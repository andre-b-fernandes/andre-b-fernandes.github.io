<nav class="navbar navbar-expand-lg site-navbar sticky-top">
  <div class="container">
    <a class="navbar-brand" href="/">{{ site.data.navbar.title }}</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ml-auto align-items-center">
        {% for content in site.data.navbar.contents %}
        <li class="nav-item">
          <a class="nav-link" id="{{ content.id }}" href="{{ content.href }}">{{ content.title }}</a>
        </li>
        {% endfor %}
        {%- if site.github_username -%}
        <li class="nav-item ml-2">
          <a class="nav-link nav-icon-link" href="https://github.com/{{ site.github_username | cgi_escape | escape }}" aria-label="GitHub" target="_blank" rel="noopener">
            <i class="bi-github" role="img"></i>
          </a>
        </li>
        {%- endif -%}
        {%- if site.linkedin_username -%}
        <li class="nav-item ml-1">
          <a class="nav-link nav-icon-link" href="https://www.linkedin.com/in/{{ site.linkedin_username | cgi_escape | escape }}" aria-label="LinkedIn" target="_blank" rel="noopener">
            <i class="bi-linkedin" role="img"></i>
          </a>
        </li>
        {%- endif -%}
      </ul>
    </div>
  </div>
</nav>
